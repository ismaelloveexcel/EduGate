name: Mobile CI

on:
  pull_request:
    paths:
      - "apps/mobile/**"
  push:
    branches: ["main"]
    paths:
      - "apps/mobile/**"

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
