name: edugate
description: EduGate - Turn kids' screen time into micro-learning via timed quizzes.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.2

  # State management
  flutter_riverpod: ^3.2.1

  # Navigation
  go_router: ^17.1.0

  # Push & local notifications
  flutter_local_notifications: ^17.2.2

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.2

  # Utilities
  uuid: ^4.3.3
  crypto: ^3.0.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
